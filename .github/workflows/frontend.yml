name: frontend
on:
  push:
    paths: ['frontend/web/**']
  pull_request:
    paths: ['frontend/web/**']
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
