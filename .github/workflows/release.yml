name: release

# Build & publish container images to GitHub Container Registry (GHCR)
# whenever main is updated AND lint+test+frontend workflows have succeeded.
# Tags: <git-sha> + latest. Consumed by deploy.yml or scripts/deploy.sh.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "WORKLOG.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile
            context: .
          - name: celery
            dockerfile: Dockerfile.celery
            context: .
          - name: web
            dockerfile: frontend/web/Dockerfile
            context: frontend/web
    steps:
      - uses: actions/checkout@v4

      - name: Skip if dockerfile missing
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "found=true"  >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ matrix.dockerfile }} not found, skipping ${{ matrix.name }}"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.found == 'true'

      - uses: docker/login-action@v3
        if: steps.check.outputs.found == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: steps.check.outputs.found == 'true'
        id: meta
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          base="ghcr.io/${repo_lc}/${{ matrix.name }}"
          sha_short=${GITHUB_SHA::7}
          echo "tags=${base}:latest,${base}:${sha_short},${base}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.found == 'true'
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max
          provenance: false

  summary:
    name: Release summary
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print pull commands
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sha_short=${GITHUB_SHA::7}
          {
            echo "## 🐳 Released images"
            echo ""
            echo "Pull on the deploy host:"
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/${repo_lc}/api:${sha_short}"
            echo "docker pull ghcr.io/${repo_lc}/celery:${sha_short}"
            echo "docker pull ghcr.io/${repo_lc}/web:${sha_short}"
            echo "\`\`\`"
            echo ""
            echo "Or run \`scripts/deploy.sh ${sha_short}\` on the prod machine."
          } >> "$GITHUB_STEP_SUMMARY"
