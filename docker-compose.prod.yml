# docker-compose.prod.yml
# Production overlay — use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires:
#   docker build -t chipwise-api:latest .
#   docker build -t chipwise-celery:latest -f Dockerfile.celery .
#   docker build -t chipwise-web:latest -f frontend/web/Dockerfile frontend/web

services:
  api:
    image: ${API_IMAGE:-chipwise-api:latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PG_PASSWORD=${PG_PASSWORD:?PG_PASSWORD required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY required}
      - SSO_CLIENT_SECRET=${SSO_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    deploy:
      replicas: ${API_REPLICAS:-1}
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/liveness"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  celery-default:
    image: ${CELERY_IMAGE:-chipwise-celery:latest}
    restart: unless-stopped
    command: celery -A src.ingestion.tasks worker -Q default,embedding -c 1 -n w1@%h
    environment:
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  celery-heavy:
    image: ${CELERY_IMAGE:-chipwise-celery:latest}
    restart: unless-stopped
    command: celery -A src.ingestion.tasks worker -Q heavy -c 1 -n w2@%h
    environment:
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  celery-crawler:
    image: ${CELERY_IMAGE:-chipwise-celery:latest}
    restart: unless-stopped
    command: celery -A src.ingestion.tasks worker -Q crawler -c 1 -n w3@%h
    environment:
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  celery-beat:
    image: ${CELERY_IMAGE:-chipwise-celery:latest}
    restart: unless-stopped
    command: celery -A src.ingestion.tasks beat --loglevel=info
    environment:
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  frontend-web:
    image: ${WEB_IMAGE:-chipwise-web:latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
