# ChipWise Enterprise — Model Microservices
# BGE-M3 Embedding (:8001) and bce-reranker (:8002)
# Usage: docker-compose -f docker-compose.services.yml up -d

services:
  embedding-service:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    container_name: chipwise-embedding
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=BAAI/bge-m3
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  reranker-service:
    build:
      context: .
      dockerfile: Dockerfile.reranker
    container_name: chipwise-reranker
    ports:
      - "8002:8002"
    environment:
      - MODEL_NAME=maidalun1020/bce-reranker-base_v1
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  model-cache:
