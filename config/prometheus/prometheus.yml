global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: chipwise_api
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: bgem3_embedding
    static_configs:
      - targets: ["host.docker.internal:8001"]
    metrics_path: /metrics

  - job_name: bce_reranker
    static_configs:
      - targets: ["host.docker.internal:8002"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

rule_files:
  - "alert_rules.yml"
